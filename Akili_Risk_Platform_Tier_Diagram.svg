<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1600" height="1200" fill="#F5EFE0"/>

  <!-- Subtle paper texture lines -->
  <g opacity="0.04">
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#2A2A2A" stroke-width="1"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke="#2A2A2A" stroke-width="1"/>
    <line x1="0" y1="1000" x2="1600" y2="1000" stroke="#2A2A2A" stroke-width="1"/>
  </g>

  <!-- ===== Title ===== -->
  <text x="800" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#1B3A4B" letter-spacing="2">
    AKILI RISK INTELLIGENCE
  </text>
  <text x="800" y="72" text-anchor="middle" font-size="15" font-weight="400" fill="#4A5560" letter-spacing="0.5">
    Platform-Owned Pillar Catalog + Per-Advisor Customization Layer
  </text>

  <!-- ===== PLATFORM TIER BAND ===== -->
  <!-- Outer rounded panel -->
  <rect x="50" y="95" width="1500" height="240" rx="14" fill="#1B3A4B"/>
  <rect x="50" y="95" width="1500" height="240" rx="14" fill="none" stroke="#0E2530" stroke-width="2"/>

  <!-- Header strip -->
  <rect x="50" y="95" width="1500" height="46" rx="14" fill="#0E2530"/>
  <rect x="50" y="125" width="1500" height="16" fill="#0E2530"/>
  <text x="74" y="125" font-size="18" font-weight="700" fill="#F5EFE0" letter-spacing="3">AKILI · PLATFORM TIER</text>
  <text x="1526" y="125" text-anchor="end" font-size="11" font-weight="500" fill="#9FB8C4" letter-spacing="2">AKILI OWNS PILLAR IDENTITY · ADVISORS CUSTOMIZE UNDERNEATH</text>

  <!-- Three pillars of the platform -->
  <!-- Column 1: Infrastructure -->
  <g>
    <rect x="80" y="160" width="460" height="160" rx="8" fill="#234A5E" stroke="#3A6B82" stroke-width="1"/>
    <text x="100" y="186" font-size="14" font-weight="700" fill="#F5EFE0" letter-spacing="1.5">INFRASTRUCTURE</text>
    <line x1="100" y1="195" x2="180" y2="195" stroke="#7AB0C4" stroke-width="2"/>
    <text x="100" y="218" font-size="12.5" fill="#D8E4EA">• Hosting &amp; CDN</text>
    <text x="100" y="238" font-size="12.5" fill="#D8E4EA">• Authentication (NextAuth + MFA)</text>
    <text x="100" y="258" font-size="12.5" fill="#D8E4EA">• Database (PostgreSQL / Prisma)</text>
    <text x="100" y="278" font-size="12.5" fill="#D8E4EA">• Security &amp; Encryption</text>
    <text x="100" y="298" font-size="12.5" fill="#D8E4EA">• Billing (Stripe) &amp; Admin Console</text>
  </g>

  <!-- Column 2: Pillar Catalog (platform-owned) -->
  <g>
    <rect x="570" y="160" width="460" height="160" rx="8" fill="#2A5468" stroke="#5C8FA8" stroke-width="2"/>
    <!-- Platform-owned badge in top-right of card -->
    <g transform="translate(955,170)">
      <rect x="0" y="0" width="64" height="22" rx="11" fill="#F5EFE0" stroke="#1B3A4B" stroke-width="1"/>
      <!-- padlock glyph -->
      <g transform="translate(8,4) scale(0.6)" stroke="#1B3A4B" stroke-width="1.6" fill="none">
        <path d="M3 11 V8 a5 5 0 0 1 10 0 V11" stroke-linecap="round"/>
        <rect x="1" y="11" width="14" height="11" rx="1.5" fill="#1B3A4B" stroke="none"/>
        <circle cx="8" cy="16" r="1.4" fill="#F5EFE0"/>
        <line x1="8" y1="17.2" x2="8" y2="19.4" stroke="#F5EFE0"/>
      </g>
      <text x="38" y="15" font-size="9" font-weight="700" fill="#1B3A4B" letter-spacing="0.5">LOCKED</text>
    </g>
    <text x="590" y="186" font-size="14" font-weight="700" fill="#F5EFE0" letter-spacing="1.5">PILLAR CATALOG</text>
    <text x="590" y="201" font-size="10" font-weight="600" fill="#9FB8C4" letter-spacing="1.5">10 PLATFORM PILLARS · AKILI-OWNED</text>
    <line x1="590" y1="209" x2="670" y2="209" stroke="#7AB0C4" stroke-width="2"/>
    <text x="590" y="228" font-size="12.5" fill="#D8E4EA">• Canonical pillar identity (slug + name)</text>
    <text x="590" y="247" font-size="12.5" fill="#D8E4EA">• Default scoring + threshold seeds</text>
    <text x="590" y="266" font-size="12.5" fill="#D8E4EA">• Default recommendation library</text>
    <text x="590" y="285" font-size="12.5" fill="#D8E4EA">• Catalog versioning + change fanout</text>
    <text x="590" y="305" font-size="11" font-style="italic" fill="#9FB8C4">  Advisors cannot create or delete pillars.</text>
  </g>

  <!-- Column 3: Branding System -->
  <g>
    <rect x="1060" y="160" width="460" height="160" rx="8" fill="#234A5E" stroke="#3A6B82" stroke-width="1"/>
    <text x="1080" y="186" font-size="14" font-weight="700" fill="#F5EFE0" letter-spacing="1.5">BRANDING SYSTEM</text>
    <line x1="1080" y1="195" x2="1160" y2="195" stroke="#7AB0C4" stroke-width="2"/>
    <text x="1080" y="218" font-size="12.5" fill="#D8E4EA">• White-Label Engine</text>
    <text x="1080" y="238" font-size="12.5" fill="#D8E4EA">• Per-Advisor Subdomain Routing</text>
    <text x="1080" y="258" font-size="12.5" fill="#D8E4EA">• Theming (logo, colors, type)</text>
    <text x="1080" y="278" font-size="12.5" fill="#D8E4EA">• Report &amp; Email Templating</text>
    <text x="1080" y="298" font-size="12.5" fill="#D8E4EA">• Default Akili Lockup Fallback</text>
  </g>

  <!-- ===== INHERITANCE BAND ===== -->
  <g>
    <rect x="50" y="355" width="1500" height="44" rx="22" fill="#E8DCC2" stroke="#C4B595" stroke-width="1.5"/>
    <text x="800" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#5A4A2A" letter-spacing="2">
      ▼   PILLAR CATALOG INHERITED BY ALL ADVISORS   ▼
    </text>
    <text x="800" y="393" text-anchor="middle" font-size="10.5" font-weight="500" fill="#7A6A45" letter-spacing="0.5">
      Advisors may deactivate or rename pillars · cannot create or delete · everything underneath is advisor-owned
    </text>
  </g>

  <!-- Arrows from band down to each advisor card -->
  <g stroke="#8A7A5A" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <line x1="320" y1="399" x2="320" y2="440"/>
    <line x1="800" y1="399" x2="800" y2="440"/>
    <line x1="1280" y1="399" x2="1280" y2="440"/>
  </g>
  <g fill="#8A7A5A">
    <polygon points="320,448 314,436 326,436"/>
    <polygon points="800,448 794,436 806,436"/>
    <polygon points="1280,448 1274,436 1286,436"/>
  </g>

  <!-- ===== PER-ADVISOR CUSTOMIZATION LAYER ===== -->
  <text x="800" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#6A5A3A" letter-spacing="3">
    PER-ADVISOR CUSTOMIZATION LAYER
  </text>

  <!-- ===== ADVISOR 1: BELVEDERE (dark green) ===== -->
  <g>
    <!-- Card body -->
    <rect x="80" y="455" width="460" height="395" rx="10" fill="#FFFFFF" stroke="#2D5C3F" stroke-width="2"/>
    <!-- Header strip -->
    <rect x="80" y="455" width="460" height="74" rx="10" fill="#2D5C3F"/>
    <rect x="80" y="510" width="460" height="19" fill="#2D5C3F"/>
    <text x="100" y="485" font-size="20" font-weight="700" fill="#F5EFE0" letter-spacing="1">BELVEDERE</text>
    <text x="100" y="508" font-size="11.5" font-weight="500" fill="#C8D8CD" letter-spacing="1.5">DEACTIVATED 4 · RENAMED 6 · HEAVY CUSTOMIZER</text>

    <!-- Inherits section -->
    <rect x="100" y="545" width="420" height="115" rx="6" fill="#F0EAD8" stroke="#D4C8A8" stroke-width="1"/>
    <text x="116" y="565" font-size="11" font-weight="700" fill="#5A4A2A" letter-spacing="1.5">INHERITS FROM PLATFORM</text>
    <text x="116" y="586" font-size="11.5" fill="#3A3A3A">✓ Infrastructure, Auth, Billing</text>
    <text x="116" y="604" font-size="11.5" fill="#3A3A3A">✓ Branding engine + subdomain</text>
    <text x="116" y="622" font-size="11.5" fill="#3A3A3A">▣ Catalog identity for all 10 platform pillars</text>
    <text x="116" y="640" font-size="11.5" fill="#3A3A3A">✓ White-label report templates</text>

    <!-- Customized section -->
    <rect x="100" y="675" width="420" height="160" rx="6" fill="#E5EEE7" stroke="#2D5C3F" stroke-width="1.5"/>
    <text x="116" y="695" font-size="11" font-weight="700" fill="#2D5C3F" letter-spacing="1.5">CUSTOMIZED (under the catalog)</text>
    <text x="116" y="716" font-size="11.5" fill="#1F3F2C">• Active set: 6 pillars (deactivated 4 of 10)</text>
    <text x="116" y="734" font-size="11.5" fill="#1F3F2C">• Renamed all 6 to Belvedere terminology</text>
    <text x="116" y="752" font-size="11.5" fill="#1F3F2C">• Curated Belvedere question bank</text>
    <text x="116" y="770" font-size="11.5" fill="#1F3F2C">• Custom scoring weights &amp; thresholds</text>
    <text x="116" y="788" font-size="11.5" fill="#1F3F2C">• Curated recommendation library + branding</text>
    <text x="116" y="814" font-size="10.5" font-style="italic" fill="#4A6A55">Heavy overrider — Belvedere has its own</text>
    <text x="116" y="828" font-size="10.5" font-style="italic" fill="#4A6A55">methodology IP and uses every affordance.</text>
  </g>

  <!-- ===== ADVISOR 2: ADVISOR B (slate-blue) ===== -->
  <g>
    <rect x="570" y="455" width="460" height="395" rx="10" fill="#FFFFFF" stroke="#4A6B8A" stroke-width="2"/>
    <rect x="570" y="455" width="460" height="74" rx="10" fill="#4A6B8A"/>
    <rect x="570" y="510" width="460" height="19" fill="#4A6B8A"/>
    <text x="590" y="485" font-size="20" font-weight="700" fill="#F5EFE0" letter-spacing="1">ADVISOR B</text>
    <text x="590" y="508" font-size="11.5" font-weight="500" fill="#CFD9E5" letter-spacing="1.5">DEACTIVATED 2 · RENAMED 3 · CUSTOM SCORING &amp; RECS</text>

    <rect x="590" y="545" width="420" height="115" rx="6" fill="#F0EAD8" stroke="#D4C8A8" stroke-width="1"/>
    <text x="606" y="565" font-size="11" font-weight="700" fill="#5A4A2A" letter-spacing="1.5">INHERITS FROM PLATFORM</text>
    <text x="606" y="586" font-size="11.5" fill="#3A3A3A">✓ Infrastructure, Auth, Billing</text>
    <text x="606" y="604" font-size="11.5" fill="#3A3A3A">▣ Same 10 platform pillars (catalog identity)</text>
    <text x="606" y="622" font-size="11.5" fill="#3A3A3A">✓ Default rec library as starter content</text>
    <text x="606" y="640" font-size="11.5" fill="#3A3A3A">✓ Branding engine + subdomain</text>

    <rect x="590" y="675" width="420" height="160" rx="6" fill="#E3EAF2" stroke="#4A6B8A" stroke-width="1.5"/>
    <text x="606" y="695" font-size="11" font-weight="700" fill="#2E4A65" letter-spacing="1.5">CUSTOMIZED (under the catalog)</text>
    <text x="606" y="716" font-size="11.5" fill="#1F2F45">• Deactivated Geographic + Reputational pillars</text>
    <text x="606" y="734" font-size="11.5" fill="#1F2F45">• Renamed 3 pillars to firm vocabulary</text>
    <text x="606" y="752" font-size="11.5" fill="#1F2F45">• Re-weighted scoring (Cyber ↑, Insurance ↓)</text>
    <text x="606" y="770" font-size="11.5" fill="#1F2F45">• Edited question bank in 4 pillars</text>
    <text x="606" y="788" font-size="11.5" fill="#1F2F45">• Added 22 firm-specific recommendations</text>
    <text x="606" y="814" font-size="10.5" font-style="italic" fill="#506680">Keeps the catalog as-is; differentiates</text>
    <text x="606" y="828" font-size="10.5" font-style="italic" fill="#506680">on active set, questions, scoring, recs.</text>
  </g>

  <!-- ===== ADVISOR 3: ADVISOR C (burnt orange) ===== -->
  <g>
    <rect x="1060" y="455" width="460" height="395" rx="10" fill="#FFFFFF" stroke="#C26A3F" stroke-width="2"/>
    <rect x="1060" y="455" width="460" height="74" rx="10" fill="#C26A3F"/>
    <rect x="1060" y="510" width="460" height="19" fill="#C26A3F"/>
    <text x="1080" y="485" font-size="20" font-weight="700" fill="#F5EFE0" letter-spacing="1">ADVISOR C</text>
    <text x="1080" y="508" font-size="11.5" font-weight="500" fill="#F0D6C5" letter-spacing="1.5">USES ALL 10 AS-IS · LITTLE TO NO CUSTOMIZATION</text>

    <rect x="1080" y="545" width="420" height="115" rx="6" fill="#F0EAD8" stroke="#D4C8A8" stroke-width="1"/>
    <text x="1096" y="565" font-size="11" font-weight="700" fill="#5A4A2A" letter-spacing="1.5">INHERITS FROM PLATFORM</text>
    <text x="1096" y="586" font-size="11.5" fill="#3A3A3A">✓ Infrastructure, Auth, Billing</text>
    <text x="1096" y="604" font-size="11.5" fill="#3A3A3A">▣ All 10 platform pillars (active, canonical names)</text>
    <text x="1096" y="622" font-size="11.5" fill="#3A3A3A">✓ Default scoring weights &amp; thresholds</text>
    <text x="1096" y="640" font-size="11.5" fill="#3A3A3A">✓ Default rec library + starter question bank</text>

    <rect x="1080" y="675" width="420" height="160" rx="6" fill="#F5E4D5" stroke="#C26A3F" stroke-width="1.5"/>
    <text x="1096" y="695" font-size="11" font-weight="700" fill="#8A4520" letter-spacing="1.5">CUSTOMIZED (under the catalog)</text>
    <text x="1096" y="716" font-size="11.5" fill="#5A2F18">• None — runs the Akili defaults end-to-end</text>
    <text x="1096" y="734" font-size="11.5" fill="#5A2F18">• No pillars deactivated, no renames</text>
    <text x="1096" y="752" font-size="11.5" fill="#5A2F18">• No question edits, no scoring overrides</text>
    <text x="1096" y="770" font-size="11.5" fill="#5A2F18">• Default Akili lockup &amp; subdomain</text>
    <text x="1096" y="788" font-size="11.5" fill="#5A2F18">• Zero-config onboarding</text>
    <text x="1096" y="814" font-size="10.5" font-style="italic" fill="#7A4A30">Pure inheritor — easiest path to live;</text>
    <text x="1096" y="828" font-size="10.5" font-style="italic" fill="#7A4A30">the "out-of-the-box" advisor.</text>
  </g>

  <!-- ===== FLOW DOWN TO CLIENTS / REPORTS ===== -->
  <!-- Arrows from each advisor card to channels row -->
  <g stroke="#6A6A6A" stroke-width="2" fill="none">
    <line x1="310" y1="850" x2="310" y2="890"/>
    <line x1="800" y1="850" x2="800" y2="890"/>
    <line x1="1290" y1="850" x2="1290" y2="890"/>
  </g>
  <g fill="#6A6A6A">
    <polygon points="310,898 304,886 316,886"/>
    <polygon points="800,898 794,886 806,886"/>
    <polygon points="1290,898 1284,886 1296,886"/>
  </g>

  <!-- Channel + Clients + Reports for each advisor -->
  <!-- Belvedere flow -->
  <g>
    <text x="310" y="918" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2D5C3F" letter-spacing="2">CHANNELS</text>
    <rect x="100" y="930" width="135" height="32" rx="16" fill="#2D5C3F"/>
    <text x="167.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#F5EFE0">Direct Client</text>
    <rect x="242" y="930" width="135" height="32" rx="16" fill="#2D5C3F"/>
    <text x="309.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#F5EFE0">Advisor-Mediated</text>
    <rect x="385" y="930" width="135" height="32" rx="16" fill="#FFFFFF" stroke="#2D5C3F" stroke-width="1.5"/>
    <text x="452.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#2D5C3F">Self-Service</text>

    <!-- arrow -->
    <line x1="310" y1="975" x2="310" y2="1005" stroke="#2D5C3F" stroke-width="2"/>
    <polygon points="310,1013 304,1001 316,1001" fill="#2D5C3F"/>

    <!-- Clients -->
    <rect x="160" y="1020" width="300" height="42" rx="8" fill="#FFFFFF" stroke="#2D5C3F" stroke-width="1.5"/>
    <text x="310" y="1046" text-anchor="middle" font-size="13" font-weight="700" fill="#2D5C3F" letter-spacing="1">CLIENTS · BELVEDERE BRAND</text>

    <line x1="310" y1="1062" x2="310" y2="1092" stroke="#2D5C3F" stroke-width="2"/>
    <polygon points="310,1100 304,1088 316,1088" fill="#2D5C3F"/>

    <!-- Reports -->
    <rect x="160" y="1107" width="300" height="42" rx="8" fill="#2D5C3F"/>
    <text x="310" y="1133" text-anchor="middle" font-size="13" font-weight="700" fill="#F5EFE0" letter-spacing="1">REPORTS · BELVEDERE-BRANDED</text>
  </g>

  <!-- Advisor B flow -->
  <g>
    <text x="800" y="918" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A6B8A" letter-spacing="2">CHANNELS</text>
    <rect x="590" y="930" width="135" height="32" rx="16" fill="#FFFFFF" stroke="#4A6B8A" stroke-width="1.5"/>
    <text x="657.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#4A6B8A">Direct Client</text>
    <rect x="732" y="930" width="135" height="32" rx="16" fill="#4A6B8A"/>
    <text x="799.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#F5EFE0">Advisor-Mediated</text>
    <rect x="875" y="930" width="135" height="32" rx="16" fill="#FFFFFF" stroke="#4A6B8A" stroke-width="1.5"/>
    <text x="942.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#4A6B8A">Self-Service</text>

    <line x1="800" y1="975" x2="800" y2="1005" stroke="#4A6B8A" stroke-width="2"/>
    <polygon points="800,1013 794,1001 806,1001" fill="#4A6B8A"/>

    <rect x="650" y="1020" width="300" height="42" rx="8" fill="#FFFFFF" stroke="#4A6B8A" stroke-width="1.5"/>
    <text x="800" y="1046" text-anchor="middle" font-size="13" font-weight="700" fill="#4A6B8A" letter-spacing="1">CLIENTS · ADVISOR B BRAND</text>

    <line x1="800" y1="1062" x2="800" y2="1092" stroke="#4A6B8A" stroke-width="2"/>
    <polygon points="800,1100 794,1088 806,1088" fill="#4A6B8A"/>

    <rect x="650" y="1107" width="300" height="42" rx="8" fill="#4A6B8A"/>
    <text x="800" y="1133" text-anchor="middle" font-size="13" font-weight="700" fill="#F5EFE0" letter-spacing="1">REPORTS · ADVISOR B-BRANDED</text>
  </g>

  <!-- Advisor C flow -->
  <g>
    <text x="1290" y="918" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C26A3F" letter-spacing="2">CHANNELS</text>
    <rect x="1080" y="930" width="135" height="32" rx="16" fill="#FFFFFF" stroke="#C26A3F" stroke-width="1.5"/>
    <text x="1147.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#C26A3F">Direct Client</text>
    <rect x="1222" y="930" width="135" height="32" rx="16" fill="#C26A3F"/>
    <text x="1289.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#F5EFE0">Advisor-Mediated</text>
    <rect x="1365" y="930" width="135" height="32" rx="16" fill="#C26A3F"/>
    <text x="1432.5" y="950" text-anchor="middle" font-size="11" font-weight="600" fill="#F5EFE0">Self-Service</text>

    <line x1="1290" y1="975" x2="1290" y2="1005" stroke="#C26A3F" stroke-width="2"/>
    <polygon points="1290,1013 1284,1001 1296,1001" fill="#C26A3F"/>

    <rect x="1140" y="1020" width="300" height="42" rx="8" fill="#FFFFFF" stroke="#C26A3F" stroke-width="1.5"/>
    <text x="1290" y="1046" text-anchor="middle" font-size="13" font-weight="700" fill="#C26A3F" letter-spacing="1">CLIENTS · DEFAULT AKILI BRAND</text>

    <line x1="1290" y1="1062" x2="1290" y2="1092" stroke="#C26A3F" stroke-width="2"/>
    <polygon points="1290,1100 1284,1088 1296,1088" fill="#C26A3F"/>

    <rect x="1140" y="1107" width="300" height="42" rx="8" fill="#C26A3F"/>
    <text x="1290" y="1133" text-anchor="middle" font-size="13" font-weight="700" fill="#F5EFE0" letter-spacing="1">REPORTS · AKILI-DEFAULT TEMPLATE</text>
  </g>

  <!-- ===== LEGEND / FOOTER ===== -->
  <g>
    <rect x="50" y="1168" width="1500" height="22" rx="11" fill="#FFFFFF" stroke="#C4B595" stroke-width="1"/>
    <text x="800" y="1184" text-anchor="middle" font-size="11" fill="#5A4A2A" letter-spacing="1">
      <tspan font-weight="700">▣ Catalog is platform-owned:</tspan> 10 pillars, Akili-curated, not advisor-creatable ·
      <tspan font-weight="700">Customization lives underneath:</tspan> questions, scoring, recs, branding ·
      <tspan font-weight="700">Per-pillar advisor affordances:</tspan> deactivate + rename only.
    </text>
  </g>
</svg>
