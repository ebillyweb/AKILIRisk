<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --brand-primary: #4EA5D9;
        --trust-accent: #D97706;
        --foreground: #1e293b;
        --muted-foreground: #64748b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --brand-primary: #7DD3FC;
          --trust-accent: #F59E0B;
          --foreground: #f1f5f9;
          --muted-foreground: #94a3b8;
        }
      }

      .brand-primary { fill: var(--brand-primary); }
      .trust-accent { fill: var(--trust-accent); stroke: var(--trust-accent); }
      .foreground { fill: var(--foreground); }
      .muted-foreground { fill: var(--muted-foreground); }
    </style>

    <linearGradient id="dataFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--trust-accent)" stop-opacity="0.15" />
      <stop offset="100%" stop-color="var(--brand-primary)" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Radar Chart Icon -->
  <g transform="translate(100,70)">
    <!-- Outer ring -->
    <polygon points="0,-35 28,-11 18,30 -18,30 -28,-11"
             fill="none"
             stroke="var(--brand-primary)"
             stroke-width="2.5"
             stroke-linejoin="round"
             opacity="0.8"/>

    <!-- Inner ring -->
    <polygon points="0,-22 18,-7 11,19 -11,19 -18,-7"
             fill="none"
             stroke="var(--brand-primary)"
             stroke-width="2"
             stroke-linejoin="round"
             opacity="0.6"/>

    <!-- Center ring -->
    <polygon points="0,-12 10,-4 6,10 -6,10 -10,-4"
             fill="none"
             stroke="var(--brand-primary)"
             stroke-width="1.5"
             stroke-linejoin="round"
             opacity="0.4"/>

    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="var(--brand-primary)" stroke-width="1.8" stroke-linecap="round" opacity="0.7" />
    <line x1="0" y1="0" x2="28" y2="-11" stroke="var(--brand-primary)" stroke-width="1.8" stroke-linecap="round" opacity="0.7" />
    <line x1="0" y1="0" x2="18" y2="30" stroke="var(--brand-primary)" stroke-width="1.8" stroke-linecap="round" opacity="0.7" />
    <line x1="0" y1="0" x2="-18" y2="30" stroke="var(--brand-primary)" stroke-width="1.8" stroke-linecap="round" opacity="0.7" />
    <line x1="0" y1="0" x2="-28" y2="-11" stroke="var(--brand-primary)" stroke-width="1.8" stroke-linecap="round" opacity="0.7" />

    <!-- Risk assessment data polygon -->
    <polygon points="0,-28 22,-6 12,20 -8,15 -20,-6"
             fill="url(#dataFill)"
             stroke="var(--trust-accent)"
             stroke-width="2.5"
             stroke-linejoin="round"/>

    <!-- Data points -->
    <circle cx="0" cy="-28" r="3" class="trust-accent"/>
    <circle cx="22" cy="-6" r="3" class="trust-accent"/>
    <circle cx="12" cy="20" r="3" class="trust-accent"/>
    <circle cx="-8" cy="15" r="3" class="trust-accent"/>
    <circle cx="-20" cy="-6" r="3" class="trust-accent"/>

    <!-- Center point -->
    <circle cx="0" cy="0" r="4" class="brand-primary"/>
  </g>

  <!-- AKILI Text -->
  <text x="100" y="165" text-anchor="middle" font-family="IBM Plex Sans, -apple-system, system-ui, sans-serif" font-size="48" font-weight="800" class="foreground" letter-spacing="1.2">AKILI</text>

  <!-- Trademark -->
  <text x="145" y="125" text-anchor="start" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" class="trust-accent">®</text>

  <!-- Separator Line -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="var(--muted-foreground)" stroke-width="1" opacity="0.6"/>

  <!-- Risk Intelligence Text -->
  <text x="100" y="230" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" class="muted-foreground" letter-spacing="0.5">Risk Intelligence</text>
</svg>