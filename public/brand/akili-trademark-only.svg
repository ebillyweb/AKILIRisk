<svg width="210" height="60" viewBox="0 0 210 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --trust-accent: #D97706;
        --foreground: #1e293b;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --trust-accent: #F59E0B;
          --foreground: #f1f5f9;
        }
      }

      .trust-accent { fill: var(--trust-accent); }
      .foreground { fill: var(--foreground); }
    </style>
  </defs>

  <!-- AKILI Text -->
  <text x="20" y="40" text-anchor="start" font-family="IBM Plex Sans, -apple-system, system-ui, sans-serif" font-size="42" font-weight="800" class="foreground" letter-spacing="1.2">AKILI</text>

  <!-- Trademark -->
  <text x="191" y="8" text-anchor="start" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" class="trust-accent">®</text>
</svg>